<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced Navigation Bar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding-top: 85px;
            min-height: 100vh;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 0.8rem;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-container {
            display: flex;
            justify-content: flex-start; /* Align items to the left on desktop */
            gap: 1.5rem; /* Add space between logo and nav links */
            align-items: center;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 0.2rem;
            padding: 2px 10px;
            font-size: 1.8rem;
            font-weight: 700;
            color: rgb(23, 23, 79);
            text-decoration: none;
            transition: transform 0.3s ease;
            flex-shrink: 0;
        }

        .nav-logo:hover {
            transform: scale(1.05);
        }

        .logo-img {
            width: 75px;
            height: auto;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.1));
            transition: filter 0.3s ease;
        }

        .nav-logo:hover .logo-img {
            filter: drop-shadow(0 6px 12px rgba(23, 23, 79, 0.2));
        }

        .nav-links {
            display: flex;
            list-style: none;
            align-items: center;
            gap: 0; /* Removed gap for a more compact look */
            background: rgba(23, 23, 79, 0.05);
            padding: 0.5rem 0.2rem; /* Reduced vertical padding for a slimmer bar */
            border-radius: 50px;
            backdrop-filter: blur(10px);
        }

        .nav-links a {
            text-decoration: none;
            color: #4a5568;
            font-weight: 500;
            font-size: 0.875rem; /* Further reduced font size (14px) */
            padding: 0.5rem 0.6rem; /* Further reduced padding for a smaller hover box */
            border-radius: 25px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            white-space: nowrap;
        }

        .nav-links a:hover {
            color: white;
            background: linear-gradient(135deg, rgb(23, 23, 79) 0%, rgb(45, 45, 120) 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(23, 23, 79, 0.3);
        }

        .nav-links a.active {
            color: white;
            background: linear-gradient(135deg, rgb(23, 23, 79) 0%, rgb(45, 45, 120) 100%);
            box-shadow: 0 4px 15px rgba(23, 23, 79, 0.2);
        }

        /* Hamburger menu styles */
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            padding: 0.8rem;
            z-index: 1001;
            background: rgba(23, 23, 79, 0.1);
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .hamburger:hover {
            background: rgba(23, 23, 79, 0.15);
            transform: scale(1.05);
        }

        .hamburger span {
            width: 28px;
            height: 3px;
            background: linear-gradient(135deg, rgb(23, 23, 79) 0%, rgb(45, 45, 120) 100%);
            margin: 4px 0;
            border-radius: 2px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: center;
        }

        /* Hamburger animation */
        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(7px, 7px);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
            transform: scale(0);
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -7px);
        }

        /* Scroll effect */
        nav.scrolled {
            padding: 0.8rem 3rem;
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        nav.scrolled .nav-logo {
            font-size: 1.6rem;
        }

        nav.scrolled .logo-img {
            width: 65px;
        }

        /* Mobile styles */
        @media (max-width: 768px) {
            nav {
                padding: 1rem 1.5rem;
            }

            .nav-container {
                padding: 0;
                justify-content: space-between; /* Revert for mobile to keep hamburger on right */
                gap: 0;
            }

            .nav-logo {
                font-size: 1.6rem;
                padding: 8px 15px;
            }

            .logo-img {
                width: 65px;
            }

            .hamburger {
                display: flex;
            }

            .nav-links {
                position: fixed;
                top: 0;
                right: -100%;
                width: 100%;
                height: 100vh;
                background: linear-gradient(135deg, rgba(255, 255, 255, 0.98) 0%, rgba(245, 247, 250, 0.98) 100%);
                backdrop-filter: blur(20px);
                flex-direction: column;
                justify-content: flex-start; /* Align items to the top */
                align-items: center;
                gap: 2rem;
                transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                border-radius: 0;
                padding: 6rem 2rem 2rem; /* Add padding top to avoid content starting at the very top */
                overflow-y: auto; /* Enable scrolling for long menus */
            }

            .nav-links.active {
                right: 0;
            }

            .nav-links a {
                font-size: 1.3rem;
                padding: 1.2rem 2rem;
                width: 280px;
                text-align: center;
                border-radius: 15px;
                font-weight: 600;
                border: 2px solid transparent;
            }

            .nav-links a:hover {
                border: 2px solid rgb(23, 23, 79);
                transform: translateY(-3px);
            }

            /* Mobile menu overlay */
            .nav-links::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: -1;
                opacity: 0;
                transition: opacity 0.3s ease;
            }

            .nav-links.active::before {
                opacity: 1;
            }
        }

        /* Tablet styles */
        @media (max-width: 1024px) and (min-width: 769px) {
            nav {
                padding: 1rem 2rem;
            }

            .nav-links {
                gap: 0.3rem;
                padding: 0.6rem 1rem;
            }

            .nav-links a {
                font-size: 1rem;
                padding: 0.6rem 0.9rem; /* Reduced padding for tablet view */
            }
        }

        /* Large screens */
        @media (min-width: 1400px) {
            .nav-links a {
                font-size: 1.2rem;
                padding: 1rem 2rem;
            }
        }

        /* Demo content */
        .demo-content {
            padding: 4rem 2rem;
            text-align: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .demo-content h1 {
            color: rgb(23, 23, 79);
            margin-bottom: 1.5rem;
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, rgb(23, 23, 79) 0%, rgb(45, 45, 120) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .demo-content p {
            color: #6b7280;
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.8;
            font-size: 1.2rem;
        }

        /* Smooth animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .nav-links a {
            animation: fadeInUp 0.6s ease forwards;
        }

        .nav-links a:nth-child(1) { animation-delay: 0.1s; }
        .nav-links a:nth-child(2) { animation-delay: 0.2s; }
        .nav-links a:nth-child(3) { animation-delay: 0.3s; }
        .nav-links a:nth-child(4) { animation-delay: 0.4s; }
        .nav-links a:nth-child(5) { animation-delay: 0.5s; }
        .nav-links a:nth-child(6) { animation-delay: 0.6s; }
        .nav-links a:nth-child(7) { animation-delay: 0.7s; }
        .nav-links a:nth-child(8) { animation-delay: 0.8s; }

        /* Mobile menu animation */
        @media (max-width: 768px) {
            .nav-links a {
                opacity: 0;
                transform: translateX(50px);
                animation: none;
            }

            .nav-links.active a {
                animation: slideInRight 0.4s ease forwards;
            }

            @keyframes slideInRight {
                to {
                    opacity: 1;
                    transform: translateX(0);
                }
            }
        }

        /* Focus states for accessibility */
        .nav-links a:focus,
        .hamburger:focus {
            outline: 2px solid rgb(23, 23, 79);
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <img src="{{ url_for('static', filename='pics/KBI_logo.png') }}" alt="Company Logo" class="logo-img">
                <span>KBI</span>
            </a>
            <div class="nav-links" id="navLinks">
                <a href="/">Home</a>
                <a href="/about_us">About Us</a>
                <a href="/customers">Customers</a>
                <a href="/processes">Processes</a>
                <a href="/products">Products</a>
                <a href="/machines">Machines</a>
                <a href="/certifications">Certifications</a>
                <a href="/contact_us">Contact</a>
            </div>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>
    <script>
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('navLinks');
        const navbar = document.getElementById('navbar');

        // Hamburger menu toggle
        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            navLinks.classList.toggle('active');
            document.body.style.overflow = navLinks.classList.contains('active') ? 'hidden' : 'auto';
        });

        // Handles clicks on nav links for both mobile and desktop.
        navLinks.addEventListener('click', (e) => {
            if (e.target.tagName === 'A') {
                // If mobile menu is open, close it.
                if (navLinks.classList.contains('active')) {
                    hamburger.classList.remove('active');
                    navLinks.classList.remove('active');
                    document.body.style.overflow = 'auto';
                }
                
                // Update active state for the clicked link.
                document.querySelectorAll('.nav-links a').forEach(link => {
                    link.classList.remove('active');
                });
                // Add active class to clicked link
                e.target.classList.add('active');
            }
        });

        // Close mobile menu when clicking outside
        document.addEventListener('click', (e) => {
            const navbar = document.querySelector('.navbar');
            if (!navbar.contains(e.target) && navLinks.classList.contains('active')) {
                hamburger.classList.remove('active');
                navLinks.classList.remove('active');
                document.body.style.overflow = 'auto';
            }
        });

        // Scroll effect for navbar
        let lastScrollTop = 0;
        window.addEventListener('scroll', () => {
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            
            if (scrollTop > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
            
            lastScrollTop = scrollTop;
        });

        // Keyboard navigation support
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && navLinks.classList.contains('active')) {
                hamburger.classList.remove('active');
                navLinks.classList.remove('active');
                document.body.style.overflow = 'auto';
            }
        });

        // Set active link based on current page (you can modify this logic)
        window.addEventListener('DOMContentLoaded', () => {
            const currentPath = window.location.pathname;
            const links = document.querySelectorAll('.nav-links a');
            let activeLinkSet = false;
            
            // First, remove 'active' from all links to ensure a clean state.
            links.forEach(link => link.classList.remove('active'));

            links.forEach(link => {
                if (link.getAttribute('href') === currentPath) {
                    link.classList.add('active');
                    activeLinkSet = true;
                }
            });
            
            // If no exact match, set Home as active for the root path as a fallback.
            if (!activeLinkSet && (currentPath === '/' || currentPath === '')) {
                const homeLink = document.querySelector('.nav-links a[href="/"]');
                if (homeLink) homeLink.classList.add('active');
            }
        });
    </script>
</body>
</html>
