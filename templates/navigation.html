<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced Navigation Bar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 0.8rem;
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            transition: background 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                        box-shadow 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                        padding 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Transparent state over hero */
        nav.hero-nav {
            background: transparent;
            box-shadow: none;
            border-bottom-color: transparent;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
        }

        nav.hero-nav .nav-logo {
            color: #fff;
        }

        nav.hero-nav .nav-links {
            background: transparent;
        }

        nav.hero-nav .nav-links a {
            color: rgba(255, 255, 255, 0.92);
        }

        nav.hero-nav .nav-links a:hover,
        nav.hero-nav .nav-links a.active {
            background: rgba(255, 255, 255, 0.18);
            color: #fff;
            box-shadow: none;
        }

        nav.hero-nav .hamburger span {
            background: linear-gradient(135deg, #fff, rgba(255,255,255,0.8));
        }

        .nav-container {
            display: flex;
            justify-content: flex-start;
            gap: 1.5rem;
            align-items: center;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 0.2rem;
            padding: 2px 10px;
            font-size: 1.8rem;
            font-weight: 700;
            color: rgb(23, 23, 79);
            text-decoration: none;
            transition: transform 0.3s ease, color 0.4s ease;
            flex-shrink: 0;
        }

        .nav-logo:hover {
            transform: scale(1.05);
            background: transparent;
            border: none;
        }

        .logo-img {
            width: 75px;
            height: auto;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.1));
            transition: filter 0.3s ease;
        }

        .nav-logo:hover .logo-img {
            filter: drop-shadow(0 6px 12px rgba(23, 23, 79, 0.2));
        }

        nav.hero-nav .logo-img {
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3)) brightness(2);
        }

        .nav-links {
            display: flex;
            list-style: none;
            align-items: center;
            gap: 0;
            background: rgba(23, 23, 79, 0.05);
            padding: 0.5rem 0.2rem;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            transition: background 0.4s ease;
        }

        .nav-links a {
            text-decoration: none;
            color: #4a5568;
            font-weight: 500;
            font-size: 0.875rem;
            padding: 0.5rem 0.6rem;
            border-radius: 25px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            white-space: nowrap;
            border: none;
        }

        .nav-links a:hover {
            color: white;
            background: linear-gradient(135deg, rgb(23, 23, 79) 0%, rgb(45, 45, 120) 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(23, 23, 79, 0.3);
            border: none;
        }

        .nav-links a.active {
            color: white;
            background: linear-gradient(135deg, rgb(23, 23, 79) 0%, rgb(45, 45, 120) 100%);
            box-shadow: 0 4px 15px rgba(23, 23, 79, 0.2);
            border: none;
        }

        /* Hamburger menu styles */
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            padding: 0.8rem;
            z-index: 1001;
            background: rgba(23, 23, 79, 0.1);
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .hamburger:hover {
            background: rgba(23, 23, 79, 0.15);
            transform: scale(1.05);
        }

        nav.hero-nav .hamburger {
            background: rgba(255,255,255,0.2);
        }

        nav.hero-nav .hamburger:hover {
            background: rgba(255,255,255,0.3);
        }

        .hamburger span {
            width: 28px;
            height: 3px;
            background: linear-gradient(135deg, rgb(23, 23, 79) 0%, rgb(45, 45, 120) 100%);
            margin: 4px 0;
            border-radius: 2px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: center;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(7px, 7px);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
            transform: scale(0);
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -7px);
        }

        /* Scrolled state */
        nav.scrolled {
            padding: 0.8rem 3rem;
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        nav.scrolled .nav-logo {
            font-size: 1.6rem;
            color: rgb(23, 23, 79);
        }

        nav.scrolled .logo-img {
            width: 65px;
            filter: none;
        }

        /* Mobile styles */
        @media (max-width: 768px) {
            nav {
                padding: 1rem 1.5rem;
            }

            .nav-container {
                padding: 0;
                justify-content: space-between;
                gap: 0;
            }

            .nav-logo {
                font-size: 1.6rem;
                padding: 8px 15px;
            }

            .logo-img {
                width: 65px;
            }

            .hamburger {
                display: flex;
            }

            .nav-links {
                position: fixed;
                top: 0;
                right: -100%;
                width: 100%;
                height: 100vh;
                background: linear-gradient(135deg, rgba(255, 255, 255, 0.98) 0%, rgba(245, 247, 250, 0.98) 100%);
                backdrop-filter: blur(20px);
                flex-direction: column;
                justify-content: flex-start;
                align-items: center;
                gap: 2rem;
                transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                border-radius: 0;
                padding: 6rem 2rem 2rem;
                overflow-y: auto;
            }

            .nav-links.active {
                right: 0;
            }

            .nav-links a {
                font-size: 1.3rem;
                padding: 1.2rem 2rem;
                width: 280px;
                text-align: center;
                border-radius: 15px;
                font-weight: 600;
                border: 2px solid transparent;
                color: #4a5568;
            }

            nav.hero-nav .nav-links a {
                color: #4a5568;
            }

            .nav-links a:hover {
                border: 2px solid rgb(23, 23, 79);
                transform: translateY(-3px);
            }

            .nav-links::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: -1;
                opacity: 0;
                transition: opacity 0.3s ease;
            }

            .nav-links.active::before {
                opacity: 1;
            }
        }

        /* Tablet styles */
        @media (max-width: 1024px) and (min-width: 769px) {
            nav {
                padding: 1rem 2rem;
            }

            .nav-links {
                gap: 0.3rem;
                padding: 0.6rem 1rem;
            }

            .nav-links a {
                font-size: 1rem;
                padding: 0.6rem 0.9rem;
            }
        }

        /* Large screens */
        @media (min-width: 1400px) {
            .nav-links a {
                font-size: 1.2rem;
                padding: 1rem 2rem;
            }
        }

        /* Focus states for accessibility */
        .nav-links a:focus,
        .hamburger:focus {
            outline: 2px solid rgb(23, 23, 79);
            outline-offset: 2px;
        }

        nav.hero-nav .nav-links a:focus {
            outline-color: #fff;
        }
    </style>
</head>
<body>
    <nav class="navbar hero-nav" id="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <img src="{{ url_for('static', filename='pics/KBI_logo.png') }}" alt="Company Logo" class="logo-img">
                <span>KBI</span>
            </a>
            <div class="nav-links" id="navLinks">
                <a href="/">Home</a>
                <a href="/about_us">About Us</a>
                <a href="/customers">Customers</a>
                <a href="/processes">Processes</a>
                <a href="/products">Products</a>
                <a href="/machines">Machines</a>
                <a href="/certifications">Certifications</a>
                <a href="/contact_us">Contact</a>
            </div>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>
    <script>
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('navLinks');
        const navbar = document.getElementById('navbar');

        // Hamburger menu toggle
        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            navLinks.classList.toggle('active');
            document.body.style.overflow = navLinks.classList.contains('active') ? 'hidden' : 'auto';
        });

        navLinks.addEventListener('click', (e) => {
            if (e.target.tagName === 'A') {
                if (navLinks.classList.contains('active')) {
                    hamburger.classList.remove('active');
                    navLinks.classList.remove('active');
                    document.body.style.overflow = 'auto';
                }
                document.querySelectorAll('.nav-links a').forEach(link => {
                    link.classList.remove('active');
                });
                e.target.classList.add('active');
            }
        });

        document.addEventListener('click', (e) => {
            const navbarEl = document.querySelector('.navbar');
            if (!navbarEl.contains(e.target) && navLinks.classList.contains('active')) {
                hamburger.classList.remove('active');
                navLinks.classList.remove('active');
                document.body.style.overflow = 'auto';
            }
        });

        // Transparent-to-solid scroll behavior
        let lastScrollTop = 0;
        function updateNavState() {
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            const heroHeight = window.innerHeight * 0.75;

            if (scrollTop > heroHeight) {
                navbar.classList.add('scrolled');
                navbar.classList.remove('hero-nav');
            } else if (scrollTop < 50) {
                navbar.classList.remove('scrolled');
                navbar.classList.add('hero-nav');
            } else {
                // In transition zone: keep scrolled state once added
                if (scrollTop > lastScrollTop) {
                    navbar.classList.add('scrolled');
                    navbar.classList.remove('hero-nav');
                }
            }
            lastScrollTop = scrollTop;
        }

        window.addEventListener('scroll', updateNavState, { passive: true });

        // Initialize on load
        window.addEventListener('DOMContentLoaded', () => {
            updateNavState();

            const currentPath = window.location.pathname;
            const links = document.querySelectorAll('.nav-links a');
            let activeLinkSet = false;

            links.forEach(link => link.classList.remove('active'));

            links.forEach(link => {
                if (link.getAttribute('href') === currentPath) {
                    link.classList.add('active');
                    activeLinkSet = true;
                }
            });

            if (!activeLinkSet && (currentPath === '/' || currentPath === '')) {
                const homeLink = document.querySelector('.nav-links a[href="/"]');
                if (homeLink) homeLink.classList.add('active');
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && navLinks.classList.contains('active')) {
                hamburger.classList.remove('active');
                navLinks.classList.remove('active');
                document.body.style.overflow = 'auto';
            }
        });
    </script>
</body>
</html>
